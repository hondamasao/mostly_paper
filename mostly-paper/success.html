<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order Confirmed — Mostly Paper</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0a0a0a;
    color: #e8e4dc;
    font-family: 'DM Mono', monospace;
    font-weight: 300;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
  }
  .wrap { text-align: center; max-width: 480px; }
  .check {
    width: 56px; height: 56px;
    border: 1px solid rgba(192,57,43,0.5);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 2rem;
    font-size: 1.4rem;
    color: #c0392b;
  }
  h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 3rem;
    letter-spacing: 0.08em;
    margin-bottom: 1rem;
  }
  p {
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    color: #555;
    line-height: 2;
    margin-bottom: 0.5rem;
  }
  .back {
    display: inline-block;
    margin-top: 2.5rem;
    font-family: 'DM Mono', monospace;
    font-size: 0.62rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    text-decoration: none;
    padding: 0.85rem 1.8rem;
    border: 1px solid rgba(232,228,220,0.25);
    color: #e8e4dc;
    transition: all 0.2s;
  }
  .back:hover { border-color: #e8e4dc; }
</style>
</head>
<body>
<div class="wrap">
  <div class="check">✓</div>
  <h1>Order confirmed.</h1>
  <p>Your payment was successful. A confirmation has been sent to your email.</p>
  <p>Prints are fulfilled automatically and typically ship within 2–5 business days. Originals ship directly from the artist.</p>
  <a href="/" class="back">← Back to site</a>
</div>
<script>
  // Clear cart on successful order
  localStorage.removeItem('mp_cart');
</script>
</body>
</html>
